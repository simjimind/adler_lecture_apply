<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="2026년 상반기 부모교육특강 · 아들러 부모교육분과">
<meta property="og:description" content="5월 31일 공개강의 신청 — 영화 원더와 함께 하는 가족 정서소풍">
<title>2026년 상반기 부모교육특강 · 아들러 부모교육분과</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:#faf8f4;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:2rem 1rem 3rem;
}
.wrap{width:100%;max-width:480px;}

.poster-link{
  display:block;
  cursor:pointer;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:1.2rem;
  box-shadow:0 4px 24px rgba(0,0,0,0.12);
  transition:transform .2s,box-shadow .2s;
  text-decoration:none;
}
.poster-link:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 32px rgba(0,0,0,0.18);
}
.poster-link img{
  width:100%;display:block;
}

.hint{
  text-align:center;
  font-size:13px;color:#a09080;
  margin-bottom:1.6rem;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.hint-dot{
  width:6px;height:6px;border-radius:50%;
  background:#d4747a;opacity:.6;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:.8;transform:scale(1.2)}}

.cta-btn{
  display:block;width:100%;
  padding:15px;
  background:#d4747a;color:#fff;
  border:none;border-radius:14px;
  font-size:16px;font-weight:600;
  text-align:center;text-decoration:none;
  font-family:inherit;
  cursor:pointer;
  transition:background .15s,transform .12s;
  letter-spacing:.04em;
  box-shadow:0 4px 16px rgba(212,116,122,0.35);
}
.cta-btn:hover{background:#a84e54;transform:translateY(-1px);}
</style>
</head>
<body>
<div class="wrap">

  <a class="poster-link" href="apply.html">
    <img src="poster_lecture.jpg" alt="2026년 상반기 부모교육특강 포스터">
  </a>

  <div class="hint">
    <span class="hint-dot"></span>
    포스터를 클릭하거나 아래 버튼을 눌러 신청하세요
  </div>

  <a class="cta-btn" href="apply.html">
    5월 31일 강의 신청하기 →
  </a>

</div>
</body>
</html>
